[auth]
browser_auth_path = "~/.config/ytmusic-tui/browser.json"

[player]
backend = "mpv"
volume = 80
audio_quality = "high"  # low / normal / high

[ui]
theme = "synthwave"

# Key bindings are configured separately via keymap.toml.
# See: ~/.config/ytmusic-tui/keymap.toml and config/default_keymap.toml
